name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Go server (test · vet · vuln)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Fail the build on advisories in OUR third-party dependencies, but treat stdlib
          # advisories as non-fatal: they track the Go toolchain (the release image rebuilds
          # on the latest patched go), and govulncheck's DB is routinely ahead of the runner's
          # toolchain patch level. Parse the JSON and gate on the finding's module.
          govulncheck -format json ./... > govulncheck.json || true
          govulncheck ./... || true   # human-readable report in the log (never fatal here)
          if jq -e 'select(.finding!=null) | .finding.trace[0].module
                    | select(.!="stdlib" and .!="toolchain")' govulncheck.json >/dev/null; then
            echo "::error::govulncheck found advisories in third-party dependencies"
            exit 1
          fi
          echo "No third-party dependency vulnerabilities (stdlib advisories track the toolchain)."

  agent:
    name: Rust agent (test · clippy · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - name: install libpcap (DNS sniffer links -lpcap)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - run: cargo fmt --check
      # clippy is advisory: the feature-gated eBPF paths carry intentional dead-code lints
      # in the default build, so don't fail CI on warnings — surface them instead.
      - run: cargo clippy --all-targets || true
      - run: cargo test
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit || true

  console:
    name: Dashboard (typecheck · build · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod || true
      - name: build
        run: NODE_OPTIONS=--max-old-space-size=4096 pnpm build
