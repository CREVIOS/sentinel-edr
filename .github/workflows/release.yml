name: Release

# Build + publish signed agent binaries and container images on a version tag.
# This is the reliable deploy path: artifacts are built on clean runners (no local
# build-host quirks), checksummed, and pushed — deploy then just pulls.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-binaries:
    name: Agent binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: cross deps (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: build
        working-directory: agent
        run: cargo build --release --target ${{ matrix.target }}
      - name: name + checksum
        run: |
          arch="${{ matrix.target }}"; arch="${arch%%-*}"   # x86_64 | aarch64
          out="sentinel-agent-linux-${arch}"
          cp "agent/target/${{ matrix.target }}/release/sentinel-agent" "$out"
          sha256sum "$out" > "$out.sha256"
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256

  release:
    name: GitHub Release
    needs: agent-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sentinel-agent-linux-*
          generate_release_notes: true

  images:
    name: Container images (server + dashboard)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          pull: true   # latest patched golang base (stdlib security fixes)
          tags: ghcr.io/${{ github.repository }}/server:${{ github.ref_name }}
      - name: dashboard image
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard:${{ github.ref_name }}
