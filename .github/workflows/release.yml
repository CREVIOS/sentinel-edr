name: Release

# Build + publish signed agent binaries and container images on a version tag.
# This is the reliable deploy path: artifacts are built on clean runners (no local
# build-host quirks), checksummed, and pushed — deploy then just pulls.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # CO-RE BPF object: telemetry + LSM tamper-protection hooks. Compiled with clang -target bpf,
  # so a SINGLE object is portable across kernels (BTF/CO-RE relocation) and architectures —
  # built once, shipped to every host as /usr/lib/sentinel/sentinel.bpf.o.
  bpf-object:
    name: BPF object (sentinel.bpf.o)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: bpf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev bpftool libelf-dev gcc make
      - name: build object
        working-directory: agent/bpf
        run: ./build.sh
      - name: checksum
        working-directory: agent/bpf
        run: sha256sum sentinel.bpf.o > sentinel.bpf.o.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: bpf-object
          path: |
            agent/bpf/sentinel.bpf.o
            agent/bpf/sentinel.bpf.o.sha256

  agent-binaries:
    name: Agent binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        # Build each target on its NATIVE runner — vendored libbpf (pulled by --features ebpf)
        # is painful to cross-compile, so we avoid cross entirely with a hosted arm64 runner.
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: ebpf build deps (vendored libbpf)
        run: |
          sudo apt-get update
          sudo apt-get install -y autopoint clang libelf-dev libpcap-dev pkg-config zlib1g-dev make
      # --features ebpf compiles the in-kernel tamper-protection loader INTO the shipped binary
      # (loophole L1). Without it the agent has no kill/ptrace/file LSM enforcement at all.
      - name: build
        working-directory: agent
        run: cargo build --release --features ebpf --target ${{ matrix.target }}
      - name: name + checksum
        run: |
          arch="${{ matrix.target }}"; arch="${arch%%-*}"   # x86_64 | aarch64
          out="sentinel-agent-linux-${arch}"
          cp "agent/target/${{ matrix.target }}/release/sentinel-agent" "$out"
          sha256sum "$out" > "$out.sha256"
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256

  release:
    name: GitHub Release
    needs: [agent-binaries, bpf-object]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sentinel-agent-linux-*
            dist/sentinel.bpf.o
            dist/sentinel.bpf.o.sha256
          generate_release_notes: true

  images:
    name: Container images (server + dashboard)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          pull: true   # latest patched golang base (stdlib security fixes)
          tags: ghcr.io/${{ github.repository }}/server:${{ github.ref_name }}
      - name: dashboard image
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard:${{ github.ref_name }}
