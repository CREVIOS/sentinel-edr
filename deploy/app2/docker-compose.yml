# Sentinel deployment for app2.makebell.com.
# Self-contained stack on its own internal network; only the dashboard joins the shared
# `global-proxy` network so the host nginx-proxy can reach it. Nothing is published to host
# ports (no clash with comp/tabular). TLS is terminated by the shared nginx using the
# existing app2.makebell.com certificate.
#
#   cd /home/mb_dev/sentinel/deploy/app2
#   docker compose --env-file .env up -d --build   # server + db + nats
#   ./build-dashboard.sh                            # dashboard (out-of-band build + migrate)
#
# The dashboard image is built OUTSIDE the Docker daemon's build path: on high-RAM hosts the
# in-image `next build` is OOM-killed (exit 137) by the build cgroup even with RAM free, so
# build-dashboard.sh runs the build in a memory-capped `docker run`, applies the Better Auth
# migration the same way, then assembles a COPY-only image (Dockerfile.prebuilt).
#
name: sentinel

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sentinel-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${PGPW}
      POSTGRES_DB: sentinel
    volumes:
      - sentinel-tsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [internal]

  nats:
    image: nats:2
    container_name: sentinel-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    # nats:2 image has no shell/wget for a healthcheck; the server retries the connection.
    networks: [internal]

  server:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    image: sentinel/server:app2
    container_name: sentinel-server
    restart: unless-stopped
    depends_on:
      timescaledb: { condition: service_healthy }
      nats: { condition: service_started }
    environment:
      SENTINEL_ENV: development            # TLS terminated at nginx; not exposed to host
      SENTINEL_ROLE: all
      SENTINEL_DATABASE_URL: postgres://sentinel:${PGPW}@timescaledb:5432/sentinel?sslmode=disable
      SENTINEL_NATS_URL: nats://nats:4222
      SENTINEL_JWT_SECRET: ${SENTINEL_JWT_SECRET}
      SENTINEL_ENROLL_TOKEN: ${SENTINEL_ENROLL_TOKEN}
      SENTINEL_ADMIN_USER: ${SENTINEL_ADMIN_USER}
      SENTINEL_ADMIN_PASS: ${SENTINEL_ADMIN_PASS}
      SENTINEL_TRUSTED_PROXIES: 172.16.0.0/12,10.0.0.0/8
    # global-proxy so the host nginx can reach the agent ingest API + command WS.
    networks: [internal, global-proxy]

  # Better Auth migrations run out-of-band in build-dashboard.sh (memory-capped docker run),
  # not as a compose service — the in-image build that a migrate service needs is OOM-killed
  # on this host. See the header comment.
  dashboard:
    build:
      context: ../../dashboard
      dockerfile: Dockerfile.prebuilt   # COPY-only; build-dashboard.sh produces .next/standalone first
    image: sentinel/dashboard:app2
    container_name: sentinel-dashboard
    restart: unless-stopped
    depends_on:
      server: { condition: service_started }
    environment:
      DATABASE_URL: postgres://sentinel:${PGPW}@timescaledb:5432/sentinel?sslmode=disable
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GO_API: http://server:8080
      GO_ADMIN_USER: ${SENTINEL_ADMIN_USER}
      GO_ADMIN_PASS: ${SENTINEL_ADMIN_PASS}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASS: ${SEED_ADMIN_PASS}
    networks: [internal, global-proxy]

  # No synthetic data generator. Real telemetry comes from agents installed on endpoints
  # (e.g. the host systemd agent + any others enrolled via install-agent.sh).

networks:
  internal:
  global-proxy:
    external: true

volumes:
  sentinel-tsdata:
