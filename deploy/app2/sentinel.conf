# Sentinel console at app2.makebell.com — drop into /srv/nginx-proxy/nginx/conf.d/
# Dedicated server block (exact server_name) so it claims only app2.makebell.com; the
# default tabular.conf/comp.conf vhosts are untouched. Reuses the existing app2 certificate.
# Port-80 → HTTPS redirect + ACME are already handled by the default vhost.

server {
    server_name app2.makebell.com;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/app2.makebell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app2.makebell.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    server_tokens off;
    client_max_body_size 25m;

    # Security headers (applied to all locations in this server block). The Content-Security-
    # Policy is NOT set here — the Next middleware (proxy.ts) emits a per-request nonce CSP so
    # script-src needs no 'unsafe-inline'. A static CSP here would shadow it.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Agent ingest API — ONLY enroll + events are exposed publicly. The console API
    # (login/respond/detections/stats/siem) stays internal and is reachable solely through
    # the Next BFF (/api/proxy, session-gated). Minimizes public attack surface.
    location = /api/v1/enroll {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $sentinel_api sentinel-server:8080;
        proxy_pass http://$sentinel_api;
        include proxy.conf;
    }
    location = /api/v1/events {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $sentinel_api2 sentinel-server:8080;
        proxy_pass http://$sentinel_api2;
        include proxy.conf;
    }

    # Agent command WebSocket channel.
    location /agent/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $sentinel_ws sentinel-server:8080;
        proxy_pass http://$sentinel_ws;
        include proxy.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Agent installer + prebuilt binary (served from certbot webroot).
    location = /install-agent.sh { root /var/www/html; default_type text/x-shellscript; }
    location /dl/ { root /var/www/html; }

    # Live push (Server-Sent Events) — must not be buffered, and held open long.
    location = /api/stream {
        # Standalone (no include proxy.conf) to avoid duplicate proxy_* directives; SSE needs
        # buffering off + a long read timeout. The route also sends X-Accel-Buffering: no.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $sentinel_sse sentinel-dashboard:3000;
        proxy_pass http://$sentinel_sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Console (Next.js) — everything else.
    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $sentinel_backend sentinel-dashboard:3000;
        proxy_pass http://$sentinel_backend;
        include proxy.conf;
        proxy_hide_header X-Powered-By;
    }
}
