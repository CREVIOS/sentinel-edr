# Sentinel EDR — local single-entry nginx (HTTP). Self-contained: no external includes.
#
# Route map (matches the production app2 split, minus public TLS):
#   /api/v1/enroll, /api/v1/events   -> Go server   (agent ingest only; rest of the Go API
#                                                     stays private, reachable solely via the
#                                                     Next BFF /api/proxy which is session-gated)
#   /agent/ws                        -> Go server   (agent command WebSocket)
#   /healthz /readyz                 -> Go server   (liveness/readiness probes)
#   /install-agent.sh /dl/           -> static webroot (/var/www/html, mounted ./www)
#   /api/stream                      -> dashboard   (Server-Sent Events; unbuffered, long-lived)
#   / (everything else)              -> dashboard   (Next.js console + Better Auth + BFF)
#
# Container names are resolved at request time via Docker's embedded DNS (127.0.0.11) so a
# `docker compose up -d --force-recreate` of the server/dashboard never leaves nginx pinned to
# a stale IP.
#
# --- Optional TLS -----------------------------------------------------------------------------
# To serve HTTPS instead of HTTP: drop a cert+key into ./www/../certs (mount it), then replace
# the `listen 80;` line below with:
#     listen 443 ssl;
#     ssl_certificate     /etc/nginx/certs/server.crt;
#     ssl_certificate_key /etc/nginx/certs/server.key;
# and publish 443 in docker-compose.yml. Self-signed is fine on a LAN (agents enroll with
# SENTINEL_ALLOW_INSECURE=1 or a pinned CA).

worker_processes auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  server_tokens off;
  # Agents POST event batches; allow a generous body. Bump if you raise the agent batch size.
  client_max_body_size 25m;

  resolver 127.0.0.11 valid=30s ipv6=off;

  # WebSocket upgrade map (agent command channel + any console live channel).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Shared proxy headers (inlined per-location since there is no external proxy.conf here).
  # Defined as a snippet via `map` is not possible; repeated explicitly in each location below.

  server {
    listen 80;
    listen [::]:80;

    # ---- agent ingest (public): ONLY enroll + events are exposed ----------------------------
    location = /api/v1/enroll {
      set $sentinel_api http://sentinel-server:8080;
      proxy_pass $sentinel_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/v1/events {
      set $sentinel_api http://sentinel-server:8080;
      proxy_pass $sentinel_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- agent command WebSocket -----------------------------------------------------------
    location /agent/ {
      set $sentinel_ws http://sentinel-server:8080;
      proxy_pass $sentinel_ws;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
    }

    # ---- health probes ---------------------------------------------------------------------
    location = /healthz {
      set $sentinel_h http://sentinel-server:8080;
      proxy_pass $sentinel_h;
      proxy_set_header Host $host;
    }
    location = /readyz {
      set $sentinel_r http://sentinel-server:8080;
      proxy_pass $sentinel_r;
      proxy_set_header Host $host;
    }

    # ---- agent installer + prebuilt binaries (static) --------------------------------------
    location = /install-agent.sh {
      root /var/www/html;
      default_type text/x-shellscript;
    }
    location /dl/ {
      root /var/www/html;
      autoindex off;
    }

    # ---- live push (SSE): must not be buffered, held open long -----------------------------
    location = /api/stream {
      set $sentinel_sse http://sentinel-dashboard:3000;
      proxy_pass $sentinel_sse;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_read_timeout 3600s;
      chunked_transfer_encoding off;
    }

    # ---- console (Next.js dashboard): everything else --------------------------------------
    location / {
      set $sentinel_backend http://sentinel-dashboard:3000;
      proxy_pass $sentinel_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header X-Powered-By;
    }
  }
}
