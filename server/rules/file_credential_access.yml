id: file-credential-access
title: Sensitive credential file accessed
status: stable
description: Reads of /etc/shadow, private keys, or cloud credential files indicate credential theft.
severity: high
category: file
mitre:
  - T1003.008
  - T1552.001
tactic: Credential Access
detection:
  selection:
    file.path|contains:
      - "/etc/shadow"
      - "/.ssh/id_rsa"
      - "/.aws/credentials"
      - "/.kube/config"
      - "/.docker/config.json"
  condition: selection
falsepositives:
  - Backup software, configuration management
