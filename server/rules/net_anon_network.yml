id: net-anonymizing-network
title: Connection to anonymizing network
status: stable
description: Tor/.onion or known anonymizer usage can indicate C2 or data exfiltration.
severity: medium
category: network
mitre:
  - T1090.003
tactic: Command and Control
detection:
  selection:
    network.domain|contains:
      - ".onion"
      - "torproject"
      - "tor2web"
  condition: selection
falsepositives:
  - Privacy-conscious users with approved Tor usage
