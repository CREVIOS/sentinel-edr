id: proc-privilege-escalation
title: Privilege escalation technique invoked
status: stable
description: >
  Known local privilege-escalation patterns: dirty-pipe/pwnkit binaries, setuid abuse,
  and writing to GTFOBins-style escalation paths.
severity: high
category: process
mitre:
  - T1548.001
  - T1068
tactic: Privilege Escalation
detection:
  selection:
    process.cmdline|contains:
      - "pkexec"
      - "chmod u+s"
      - "chmod 4755"
      - "find / -perm -4000"
      - "unshare -r"
      - "nsenter --target 1"
  condition: selection
falsepositives:
  - Administrators auditing setuid binaries
